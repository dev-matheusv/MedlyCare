services:
  db:
    image: postgres:16-alpine
    container_name: sfa_postgres
    environment:
      POSTGRES_DB: sfa_db
      POSTGRES_USER: sfa
      POSTGRES_PASSWORD: sfa
    ports:
      - "5432:5432"
    volumes:
      - sfa_db_data:/var/lib/postgresql/data
      - ./scripts/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfa -d sfa_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sfa_db_data:
